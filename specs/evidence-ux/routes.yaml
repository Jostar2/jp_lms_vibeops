routes:
  - id: "learner_home"
    path: "/"
    title: "Learner Home"
    source_objects:
      - "xai_cards"
      - "event_ledger"
      - "measurement_plan"
      - "measurement_result"
    required_panels:
      - "today_learning_plan"
      - "ai_tutor_session"
      - "lecture_timeline_marker"
      - "student_safety_controls"

  - id: "instructor_studio"
    path: "/instructor"
    title: "Instructor Studio"
    source_objects:
      - "event_ledger"
      - "xai_cards"
      - "approval"
      - "measurement_result"
      - "impact_ledger"
    required_panels:
      - "aggregate_struggle_summary"
      - "ai_cocreation_draft"
      - "approval_record"
      - "rollback_note"
      - "measurement_result"

  - id: "ai_evidence_board"
    path: "/evidence"
    title: "AI Evidence Board"
    source_objects:
      - "xai_card"
      - "event_ledger"
      - "approval"
      - "measurement_plan"
      - "impact_ledger"
    required_panels:
      - "judgment"
      - "evidence"
      - "model"
      - "uncertainty"
      - "recommended_action"
      - "measurement_plan"

  - id: "course_setup"
    path: "/course"
    title: "Course Setup"
    source_objects:
      - "lms_adapter"
      - "adapter_sample_events"
      - "pilot_gates"
      - "ai_operation"
    required_panels:
      - "lms_embedding_path"
      - "student_control_policy"
