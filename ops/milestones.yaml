milestones:
  - id: "M0"
    name: "Design Reset And Project Control"
    status: "completed"
    purpose: "Make JP LMS VibeOps a clean, repo-managed product design project."
    exit_criteria:
      - "Project management files exist in-repo."
      - "Git remote status is explicit."
      - "Control-plane-first direction is documented."
      - "Validation command passes."

  - id: "M1"
    name: "Executable Contracts"
    status: "completed"
    purpose: "Turn design contracts into machine-checkable artifacts."
    exit_criteria:
      - "xAI card examples validate."
      - "event catalog examples validate."
      - "approval workflow examples validate."
      - "measurement plan examples validate."
      - "measurement result and impact ledger examples validate."
      - "negative guardrail examples validate expected failures."

  - id: "M2"
    name: "Control Plane Skeleton"
    status: "completed"
    purpose: "Create the first runtime boundary without UI-first assumptions."
    exit_criteria:
      - "event ledger append/read contract exists."
      - "AI operation state machine exists."
      - "approval router blocks unsafe actions."
      - "measurement planner attaches to action cards."

  - id: "M3"
    name: "Pilot Governance Packet"
    status: "completed"
    purpose: "Prepare NetLearning and university approval materials."
    exit_criteria:
      - "APPI readiness checklist exists."
      - "IRB/pre-registration draft exists."
      - "integration fit brief exists."
      - "90-day pilot measurement protocol exists."
      - "pilot gate validation passes."

  - id: "M4"
    name: "Integration Boundary"
    status: "completed"
    purpose: "Create the LMS adapter boundary before UI work."
    exit_criteria:
      - "LMS adapter contract exists."
      - "CSV fallback sample maps to event catalog."
      - "adapter sample validates."

  - id: "M5"
    name: "Evidence UX"
    status: "completed"
    purpose: "Build UI only after contracts, approval flows, and adapter boundary are stable."
    exit_criteria:
      - "Evidence UX readiness review passes."
      - "route spec maps source objects to panels."
      - "xAI card renderer uses contract fixtures."
      - "instructor decision queue uses approval state."
      - "impact ledger uses measurement records."
      - "static UI validation passes."

  - id: "M6"
    name: "Runtime Packaging And CI Hardening"
    status: "completed"
    purpose: "Package the runtime, formalize schemas, add CI, and add UI snapshot validation."
    exit_criteria:
      - "runtime package metadata exists."
      - "formal schema validation passes."
      - "GitHub Actions CI exists."
      - "Evidence UX screenshot snapshot exists."
      - "S11/S12/S13 fixtures validate."

  - id: "M7"
    name: "Product-Level AI LMS UX Recovery"
    status: "completed"
    purpose: "Rebuild the first browser surface as a learner/instructor AI-assisted LMS product instead of an operator console."
    exit_criteria:
      - "Learner Home is the first screen."
      - "Instructor Studio supports aggregate signals, AI drafts, approval, rollback, and measurement."
      - "AI coach and xAI evidence drawer are visible product surfaces."
      - "Dynamic UX interactions are present for learner plans, AI prompts, instructor variants, approval, and Meiwaku feedback."
      - "Static UI and browser smoke validation require product-level learner/instructor concepts."

  - id: "M8"
    name: "Production Web App Foundation"
    status: "completed"
    purpose: "Move beyond the static Evidence UX artifact into a typed production web app surface."
    exit_criteria:
      - "Next.js and TypeScript workspace exists under apps/web."
      - "Control-plane fixture payload is exported as JSON for the web app."
      - "AI Learning Session slice renders learner action, generated learning objects, xAI evidence, agent run, approval boundary, measurement, and impact."
      - "Web typecheck and production build pass."
      - "CI includes Node dependency installation and web validation."
