backlog:
  - id: "JLV-0001"
    title: "Make project management explicit in repo"
    milestone: "M0"
    status: "completed"
    type: "project_control"
    acceptance:
      - "PROJECT.md explains where project management happens."
      - "ops/status.md records Git remote status."
      - "ops/milestones.yaml and ops/backlog.yaml exist."
    validation:
      - "python scripts\\validate_project.py"

  - id: "JLV-0002"
    title: "Replace UI-prototype-first roadmap with control-plane-first roadmap"
    milestone: "M0"
    status: "completed"
    type: "architecture"
    acceptance:
      - "ADR records control-plane-first decision."
      - "README no longer says Vite/Next.js is the next implementation step."
      - "roadmap starts with executable contracts."
    validation:
      - "python scripts\\validate_project.py"

  - id: "JLV-0003"
    title: "Add executable xAI card examples"
    milestone: "M1"
    status: "completed"
    type: "contract"
    acceptance:
      - "At least one student-facing and one instructor-facing xAI card example exist."
      - "Examples include evidence, model version, uncertainty, action, measurement plan."
      - "Student-facing examples avoid stigmatizing risk terms."
    validation:
      - "python scripts\\validate_contracts.py"

  - id: "JLV-0004"
    title: "Define AI operation state machine"
    milestone: "M1"
    status: "completed"
    type: "runtime_contract"
    acceptance:
      - "Allowed states and blocked states are explicit."
      - "Approval requirements are tied to transitions."
      - "Rollback and measurement transitions are represented."
    validation:
      - "python scripts\\validate_contracts.py"

  - id: "JLV-0006"
    title: "Validate S01 closed-loop contract fixtures"
    milestone: "M1"
    status: "completed"
    type: "contract_validation"
    acceptance:
      - "S01 event examples exist."
      - "S01 xAI card examples cross-reference event ids."
      - "S01 approval example matches the instructor action id."
      - "S01 measurement plan links to the approved action id."
      - "S01 AI operation transition chain validates."
      - "S01 measurement result and impact ledger examples validate."
      - "Negative guardrail examples prove forbidden language and missing approval are blocked."
    validation:
      - "python scripts\\validate_contracts.py"

  - id: "JLV-0007"
    title: "Add measurement result and impact ledger contracts"
    milestone: "M1"
    status: "completed"
    type: "contract"
    acceptance:
      - "Measurement result schema seed exists."
      - "Impact ledger schema seed exists."
      - "S01 result links to the S01 measurement plan."
      - "S01 impact ledger links action, approval, measurement, and result."
    validation:
      - "python scripts\\validate_contracts.py"

  - id: "JLV-0005"
    title: "Create pilot governance packet skeleton"
    milestone: "M3"
    status: "completed"
    type: "pilot_ops"
    acceptance:
      - "APPI checklist exists."
      - "IRB/pre-registration outline exists."
      - "NetLearning integration fit brief exists."
      - "Decision Brief ask is explicit."
    validation:
      - "python scripts\\validate_governance.py"

  - id: "JLV-0008"
    title: "Implement M2 control plane skeleton"
    milestone: "M2"
    status: "completed"
    type: "runtime"
    acceptance:
      - "Event ledger append/read contract exists."
      - "Policy gate checks xAI card action readiness."
      - "Approval router blocks unapproved execution."
      - "Measurement planner resolves measurement plans from action cards."
      - "ControlPlane runs S01 closed loop without UI."
    validation:
      - "python scripts\\run_control_plane.py --json"
      - "python -m unittest discover -s tests"

  - id: "JLV-0009"
    title: "Add pilot governance gate validation"
    milestone: "M3"
    status: "completed"
    type: "pilot_ops"
    acceptance:
      - "Pilot governance docs have required sections."
      - "Pilot gates reference concrete evidence docs."
      - "Blocking pilot gates are machine-checkable."
      - "Project validation runs governance validation."
    validation:
      - "python scripts\\validate_governance.py"

  - id: "JLV-0010"
    title: "Add LMS adapter boundary before Evidence UX"
    milestone: "M4"
    status: "completed"
    type: "integration"
    acceptance:
      - "LMS adapter schema seed exists."
      - "NetLearning CSV fallback adapter example exists."
      - "CSV fixture maps into internal event catalog objects."
      - "Adapter sample runs without UI dependencies."
    validation:
      - "python scripts\\run_adapter_sample.py"
      - "python -m unittest discover -s tests"

  - id: "JLV-0011"
    title: "Complete Evidence UX readiness review"
    milestone: "M5"
    status: "completed"
    type: "evidence_ux"
    acceptance:
      - "Evidence UX readiness review exists."
      - "Information architecture maps UI views to runtime objects."
      - "Route spec names source objects and required panels."
      - "Project validation runs Evidence UX validation."
    validation:
      - "python scripts\\validate_evidence_ux.py"

  - id: "JLV-0012"
    title: "Implement first Evidence UX static surface"
    milestone: "M5"
    status: "completed"
    type: "evidence_ux"
    acceptance:
      - "Evidence UX app renders Operations Home, S01 Closed Loop, Evidence Detail, and Integration Readiness."
      - "UI data is exported from control-plane fixtures."
      - "Static UI validation checks runtime payload and required concepts."
      - "UI keeps APPI/IRB and pilot blockers visible."
    validation:
      - "python scripts\\export_evidence_ux_data.py"
      - "python scripts\\validate_static_ui.py"
      - "python scripts\\validate_browser_smoke.py"

  - id: "JLV-0013"
    title: "Package Python runtime"
    milestone: "M6"
    status: "completed"
    type: "packaging"
    acceptance:
      - "pyproject.toml exists."
      - "Module CLI runs the S01 control-plane loop."
      - "Packaging validation is part of project validation."
    validation:
      - "python scripts\\validate_packaging.py"

  - id: "JLV-0014"
    title: "Add formal JSON Schema validation"
    milestone: "M6"
    status: "completed"
    type: "schema"
    acceptance:
      - "Formal JSON Schema files exist for core runtime objects."
      - "Schema validation checks current fixtures."
      - "Project validation runs formal schema validation."
    validation:
      - "python scripts\\validate_formal_schemas.py"

  - id: "JLV-0015"
    title: "Add GitHub Actions validation workflow"
    milestone: "M6"
    status: "completed"
    type: "ci"
    acceptance:
      - "CI runs on push and pull request."
      - "CI executes contract, runtime, governance, Evidence UX, browser smoke, schema, packaging, unit, and project validation."
    validation:
      - "python scripts\\validate_project.py"

  - id: "JLV-0016"
    title: "Add Evidence UX screenshot snapshot"
    milestone: "M6"
    status: "completed"
    type: "browser_qa"
    acceptance:
      - "Evidence UX operations-home screenshot exists."
      - "Snapshot validation checks PNG signature and size."
      - "Snapshot capture script exists but does not run automatically in project validation."
    validation:
      - "python scripts\\validate_screenshots.py"

  - id: "JLV-0017"
    title: "Expand fixtures and runtime coverage to S11/S12/S13"
    milestone: "M6"
    status: "completed"
    type: "scenario_expansion"
    acceptance:
      - "S11, S12, and S13 event fixtures exist."
      - "S11, S12, and S13 xAI cards, approvals, measurements, results, ledgers, and operations validate."
      - "Scenario matrix reports S13 as blocked while awaiting G4 approval."
      - "Evidence UX data export includes scenario matrix."
    validation:
      - "python scripts\\validate_contracts.py"
      - "python scripts\\run_scenario_matrix.py"
