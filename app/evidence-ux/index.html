<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JP LMS VibeOps Evidence UX</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">JP</div>
          <div>
            <h1>JP LMS VibeOps</h1>
            <p>AI Learning Operations</p>
          </div>
        </div>
        <nav class="nav" aria-label="Evidence UX routes">
          <button class="nav-item active" data-route="home">Operations Home</button>
          <button class="nav-item" data-route="s01">S01 Closed Loop</button>
          <button class="nav-item" data-route="evidence">Evidence Detail</button>
          <button class="nav-item" data-route="integration">Integration Readiness</button>
        </nav>
        <div class="sidebar-footer">
          <span class="status-dot"></span>
          Runtime data from control plane fixtures
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow">Evidence UX Surface</p>
            <h2 id="routeTitle">Operations Home</h2>
          </div>
          <div class="topbar-actions">
            <span class="pill" id="operationState">loading</span>
            <span class="pill warn">APPI/IRB pending</span>
          </div>
        </header>

        <section id="view" class="view" aria-live="polite"></section>
      </main>
    </div>

    <script src="./data/runtime.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
