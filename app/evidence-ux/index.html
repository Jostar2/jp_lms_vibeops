<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JP LMS VibeOps AI Learning Studio</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="rail">
        <div class="brand">
          <div class="mark">JP</div>
          <div>
            <h1>JP LMS VibeOps</h1>
            <p>AI-assisted LMS</p>
          </div>
        </div>

        <nav class="nav" aria-label="Product routes">
          <button class="nav-item active" data-route="student">
            <span>01</span>
            학습자 홈
          </button>
          <button class="nav-item" data-route="instructor">
            <span>02</span>
            교수자 스튜디오
          </button>
          <button class="nav-item" data-route="evidence">
            <span>03</span>
            AI 근거
          </button>
          <button class="nav-item" data-route="course">
            <span>04</span>
            수업 설정
          </button>
        </nav>

        <div class="rail-note">
          <strong>수업 맥락</strong>
          <span>데이터 마이닝 W7</span>
          <span>NetLearning / manaba embed</span>
          <span>AI 판단은 설명 가능해야 함</span>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="context" id="routeContext">Data Mining · W7 Lecture 2</p>
            <h2 id="routeTitle">학습자 홈</h2>
          </div>
          <div class="top-actions">
            <div class="ai-presence">
              <span class="pulse" aria-hidden="true"></span>
              AI 코치가 근거를 보고 제안 중
            </div>
            <div class="status-strip" id="statusStrip"></div>
          </div>
        </header>
        <section id="view" class="view" aria-live="polite"></section>
      </main>

      <aside class="evidence-drawer" id="evidenceDrawer" aria-live="polite"></aside>
    </div>

    <script src="./data/runtime.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
