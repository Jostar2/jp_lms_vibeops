<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Claritas · JP LMS VibeOps</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-jp.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="s-mode">
    <div class="app" id="app">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">C</div>
          <div>
            <div class="brand-name">Claritas</div>
            <div class="brand-tag">Explainable University AI</div>
          </div>
        </div>

        <div class="search-bar" role="search" tabindex="0" data-action="toggle-command">
          <span aria-hidden="true">⌕</span>
          <span>강의·주제·학생·과제를 물어보세요 — “왜 Gini/Entropy 구간에서 멈췄지?”</span>
          <span class="kbd"><span>⌘</span><span>K</span></span>
        </div>

        <div class="view-switch" role="tablist" aria-label="Persona switch">
          <button class="active" data-action="set-persona" data-persona="student">
            <span class="dot s"></span> 학습자
          </button>
          <button data-action="set-persona" data-persona="instructor">
            <span class="dot i"></span> 교수자
          </button>
        </div>

        <div class="avatar" id="avatarInitial">S</div>
      </header>

      <nav class="nav" id="leftNav" aria-label="Claritas navigation"></nav>

      <main class="main">
        <div class="main-inner" id="mainContent" aria-live="polite"></div>
      </main>

      <aside class="aside" id="rightAside" aria-live="polite"></aside>
      <div id="commandLayer"></div>
    </div>

    <script src="./data/runtime.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
